# Deployment config for deploy/deploy_easy_mjlab.py.
#
# Flat YAML format (matches deploy_easy_amp.py reference style),
# preserving the training parameters of the CustomRobot velocity policy.
#
# Observation layout (47D per frame):
#   ang_vel(3) + projected_gravity(3) + command(3) +
#   phase(2) + joint_pos(12) + joint_vel(12) + actions(12) = 47
# frame_stack=6 -> policy input = 282D.

policy_path: "/home/wangshun/X1_mjlab/logs/rsl_rl/x1_flat_velocity/2026-05-25_17-30-44/policy.onnx"

simulation_dt: 0.001
decimation: 10
# Second-order digital low-pass filter for target joint positions only.
# Keep ts aligned with the control loop period. It is intentionally explicit.
target_lpf:
  wc: 100.0
  ts: 0.001
frame_stack: 6
num_single_obs: 47

clip_observations: 100.0
clip_actions: 100.0

# Conservative deploy-time action scale.
# Training uses 0.25; deployment keeps 0.22 on purpose.
action_scale: 0.22
num_actions: 12

joint_names:
  [
    "left_hip_yaw_joint",
    "left_hip_roll_joint",
    "left_hip_pitch_joint",
    "left_knee_joint",
    "left_ankle_pitch_joint",
    "left_ankle_roll_joint",
    "right_hip_yaw_joint",
    "right_hip_roll_joint",
    "right_hip_pitch_joint",
    "right_knee_joint",
    "right_ankle_pitch_joint",
    "right_ankle_roll_joint",
  ]

# Order expected by humanoid_lowerbody_controller target callbacks.
controller_joint_names:
  [
    "left_hip_yaw_joint",
    "right_hip_yaw_joint",
    "left_hip_roll_joint",
    "right_hip_roll_joint",
    "left_hip_pitch_joint",
    "right_hip_pitch_joint",
    "left_knee_joint",
    "right_knee_joint",
    "left_ankle_pitch_joint",
    "right_ankle_pitch_joint",
    "left_ankle_roll_joint",
    "right_ankle_roll_joint",
  ]

default_angles:
  [0.0, 0.0, 0.3, -0.6, 0.3, 0.0, 0.0, 0.0, 0.3, -0.6, 0.3, 0.0]

robot_config:
  kps:
    [100.0, 150.0, 150.0, 180.0, 75.0, 30.0, 100.0, 150.0, 150.0, 180.0, 75.0, 30.0]
  kds:
    [1.0, 4.0, 4.0, 4.0, 2.0, 2.0, 1.0, 4.0, 4.0, 4.0, 2.0, 2.0]
