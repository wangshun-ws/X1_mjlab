# Deployment config for deploy/deploy_easy_mjlab.py.
#
# Flat YAML format (matches deploy_easy_amp.py reference style),
# preserving the training parameters of the CustomRobot velocity policy.
#
# Observation layout (simple phase, 47D per frame):
#   ang_vel(3) + projected_gravity(3) + command(3) + phase(2) +
#   joint_pos(12) + joint_vel(12) + last_action(12) = 47
# frame_stack=10 → policy input = 470D.

policy_path: "/home/wangshun/X_2/rl_locomotion/humanoid_deploy/policies/walk/policy5_18.onnx"
standup_policy_path: "/home/wangshun/X_2/rl_locomotion/humanoid_deploy/policies/walk/policy5_18.onnx"

simulation_dt: 0.001
decimation: 10
target_filter_alpha: 0.2
frame_stack: 10
num_single_obs: 47

phase:
  type: "simple"
  period: 0.8
  stand_threshold: 0.1

clip_observations: 100.0
clip_actions: 100.0

action_scale: 0.22
num_actions: 12

