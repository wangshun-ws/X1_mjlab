    primary:
      mode: subtree
      pattern: ^(left_ankle_roll_link|right_ankle_roll_link)$
      entity: robot
      exclude: !!python/tuple []
    secondary:
      mode: body
      pattern: terrain
      entity: null
      exclude: !!python/tuple []
    fields: !!python/tuple
