            - joint
            armature: 0.05
            frictionloss: 0.0
            stiffness: 150.0
            damping: 4.0
            effort_limit: 120.0
          delay_target: position
          delay_min_lag: 0
          delay_max_lag: 2
          delay_hold_prob: 0.0
          delay_update_period: 2001
          delay_per_env_phase: true
        - target_names_expr: !!python/tuple
