          - joint
          armature: 0.0
          frictionloss: 0.0
          base_cfg:
            target_names_expr: !!python/tuple
            - .*_hip_yaw_joint
            transmission_type: !!python/object/apply:mjlab.actuator.actuator.TransmissionType
            - joint
            armature: 0.05
            frictionloss: 0.0
            stiffness: 100.0
            damping: 1.0
            effort_limit: 80.0
          delay_target: position
          delay_min_lag: 0
          delay_max_lag: 2
          delay_hold_prob: 0.0
          delay_update_period: 2001
          delay_per_env_phase: true
        - target_names_expr: !!python/tuple
          - .*_hip_roll_joint
          transmission_type: !!python/object/apply:mjlab.actuator.actuator.TransmissionType
