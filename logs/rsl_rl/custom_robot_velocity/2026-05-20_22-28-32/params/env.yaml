      sort_actuators: false
      lights: !!python/tuple []
      cameras: !!python/tuple []
      textures: !!python/tuple []
      materials: !!python/tuple []
      collisions: !!python/tuple
      - geom_names_expr: !!python/tuple
        - .*_collision
        contype: 1
        conaffinity: 0
        condim:
          ^(left|right)_foot[0-9]+_collision$: 3
          .*_collision: 1
        priority:
          ^(left|right)_foot[0-9]+_collision$: 1
        friction:
          ^(left|right)_foot[0-9]+_collision$: !!python/tuple
          - 0.6
        solref: null
        solimp:
